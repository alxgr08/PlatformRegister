spring.application.name=backend

# ===========================================================================
#  >>> NO ESCRIBAS CREDENCIALES EN ESTE ARCHIVO <<<
#  Este archivo SI se sube a git. Las credenciales (Supabase, claves) van en:
#       backend/application-local.properties      (ignorado por git)
#  Ese archivo se importa automaticamente con la linea de abajo.
# ===========================================================================
spring.config.import=optional:file:application-local.properties,optional:file:backend/application-local.properties

# --- Driver y pool de conexiones -------------------------------------------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# --- JPA / Hibernate -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- Alta concurrencia: hilos virtuales (Java 21) --------------------------
spring.threads.virtual.enabled=true

# --- Carga masiva CSV (hasta ~500 000 filas) -------------------------------
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# --- Aplicacion (valores por defecto; se sobrescriben en application-local) -
app.admin-key=cambia-esta-clave-admin
app.cors.allowed-origins=http://localhost:5173

server.port=8080
